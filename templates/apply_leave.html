
{% extends 'main.html' %}
{% block title %}Home{% endblock %}
{% load static %}

{% block css %}
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/font-awesome.css' %}">
    <!-- ico-font-->
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/icofont.css' %}">
    <!-- Themify icon-->
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/themify.css' %}">
    <!-- Flag icon-->
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/flag-icon.css' %}">
    <!-- Feather icon-->
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/feather-icon.css' %}">
    <!-- Plugins css start-->
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/slick.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/slick-theme.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/scrollbar.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/animate.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/datatables.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/owlcarousel.css' %}">
    <!-- Plugins css Ends-->
    <!-- Bootstrap css-->
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/bootstrap.css' %}">
    <!-- App css-->
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/style.css' %}">
    <link id="color" rel="stylesheet" href="{% static 'assets/css/color-1.css' %}" media="screen">
    <!-- Responsive css-->
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/responsive.css' %}">
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

       

        .card {
            border: none;
            border-radius: 20px; /* Softer corners */
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); /* Glassmorphism effect */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05); /* Lighter, larger shadow */
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px); /* Subtle lift on hover */
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
            font-weight: 600;
        }

        label {
            font-size: 14px;
            color: #555;
            margin-bottom: 5px;
            display: block;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 15px;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #4facfe;
            outline: none;
            box-shadow: 0 0 0 2px rgba(79,172,254,0.2);
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button[type="submit"] {
            background: #000 !important;
            border: none;
            color: #fff;
            border-radius: 12px;
            padding: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        button[type="submit"]:hover {
            background: #222 !important;
        }

        .alert {
            border-radius: 12px;
            border: none;
            font-weight: 500;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        /* Messages */
        .messages {
            margin-bottom: 15px;
        }

        .messages p {
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }
        body {
            background-color: #f8fafc; /* Modern light gray/blue */
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        .container {
            padding-top: 30px;
            padding-bottom: 30px;
        }
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 8px;
        }

        input[type="date"], textarea {
            border: 2px solid #f1f5f9;
            background-color: #f8fafc;
            padding: 14px;
            border-radius: 12px;
            font-weight: 500;
        }

        input:focus, textarea:focus {
            background-color: #fff;
            border-color: #4facfe;
            box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.15);
}
/* Container for the floating effect */
.nav-container {
    position: sticky;
    top: 0;
    z-index: 1000;
}

/* Frosted Glass Effect */
.premium-nav {
    background: rgba(255, 255, 255, 0.7) !important;
    backdrop-filter: blur(15px) saturate(180%);
    -webkit-backdrop-filter: blur(15px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 20px;
    padding: 12px 0;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Brand Logo Styling */
.brand-logo {
    font-size: 1.4rem;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #1e293b 0%, #4facfe 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: flex;
    align-items: center;
}

.logo-dot {
    height: 8px;
    width: 8px;
    background: #4facfe;
    border-radius: 50%;
    margin-right: 8px;
    display: inline-block;
}

/* Animated Nav Links */
.nav-custom-link {
    color: #475569 !important;
    font-weight: 500;
    padding: 8px 16px !important;
    position: relative;
    transition: color 0.3s ease;
}

.nav-custom-link::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: 5px;
    left: 50%;
    background: #4facfe;
    transition: all 0.3s ease;
    transform: translateX(-50%);
}

.nav-custom-link:hover::after {
    width: 20px;
}

.nav-custom-link:hover {
    color: #000 !important;
}

/* Vertical Divider */
.nav-divider {
    height: 24px;
    width: 1px;
    background: rgba(0, 0, 0, 0.1);
}

/* Premium Logout Button */
.btn-logout {
    background: #fff;
    color: #ef4444;
    border: 1px solid #fee2e2;
    padding: 8px 20px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
}

.btn-logout:hover {
    background: #ef4444;
    color: #fff;
    box-shadow: 0 8px 20px rgba(239, 68, 68, 0.2);
    transform: translateY(-2px);
}

.icon-sm {
    width: 16px;
    height: 16px;
}
    </style>
    
{% endblock %}
    
{% block content %}
<div class="nav-container px-3 mt-4">
   
</div>
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-5">

            <div class="card shadow p-4">
                <h2 class="text-center mb-4">Apply Leave</h2>

                <!-- Django Messages -->
                {% if messages %}
                    <div class="mb-3">
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">From Date</label>
                        <input type="date" name="from_date" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">To Date</label>
                        <input type="date" name="to_date" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Reason</label>
                        <textarea name="reason" class="form-control" placeholder="Enter reason..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Submit Request
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>
{% endblock %}

{% endblock %}
