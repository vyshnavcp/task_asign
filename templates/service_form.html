{% extends 'main.html' %}
{% block title %}Add Service{% endblock %}
{% load static %}

{% block css %}
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/font-awesome.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/icofont.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/themify.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/flag-icon.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/feather-icon.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/slick.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/slick-theme.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/scrollbar.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/animate.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/datatables.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/owlcarousel.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/bootstrap.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/style.css' %}">
    <link id="color" rel="stylesheet" href="{% static 'assets/css/color-1.css' %}" media="screen">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/responsive.css' %}">

<style>
  /* ───── PAGE WRAPPER ───── */
  .pl-wrap {
    padding: 28px 28px;
    background: #f4f5f7;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  /* ───── TOP BAR ───── */
  .pl-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;
    background-color: white;
    padding: 22px;
  }
  .pl-topbar h4 {
    font-size: 21px;
    font-weight: 700;
    color: #1a1a1a;
    margin: 0;
  }
  .pl-topbar p {
    font-size: 13px;
    color: #6b7280;
    margin: 4px 0 0;
  }

  /* ───── FORM CARD ───── */
  .pl-form-card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.07);
    overflow: hidden;
    max-width: 640px;
    margin: 0 auto;
  }

  /* ───── FORM BODY ───── */
  .pl-form-body {
    padding: 28px;
  }

  /* ───── FORM ELEMENTS ───── */
  .pl-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 6px;
  }

  .pl-input,
  .pl-textarea {
    width: 100%;
    border: 1px solid #d1d5db;
    border-radius: 7px;
    padding: 10px 14px;
    font-size: 13.5px;
    color: #374151;
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  .pl-input:focus,
  .pl-textarea:focus {
    border-color: #22c55e;
    box-shadow: 0 0 0 3px rgba(34,197,94,0.1);
  }
  .pl-textarea {
    resize: vertical;
    min-height: 120px;
  }

  .pl-field {
    margin-bottom: 20px;
  }

  /* ───── FORM FOOTER ───── */
  .pl-form-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
  }

  /* ───── BUTTONS ───── */
  .pl-btn-submit {
    background: #22c55e;
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 13.5px;
    font-weight: 600;
    padding: 10px 24px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .pl-btn-submit:hover { background: #16a34a; }

  .pl-btn-cancel {
    border: 1px solid #d1d5db;
    background: #fff;
    border-radius: 7px;
    font-size: 13.5px;
    color: #374151;
    padding: 10px 20px;
    text-decoration: none;
    transition: background 0.13s;
    display: inline-block;
  }
  .pl-btn-cancel:hover { background: #f9fafb; color: #374151; text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<div class="pl-wrap">

  <!-- Top bar -->
  <div class="pl-topbar">
    <div>
      <h4>Service</h4>
      <p>Add company service details</p>
    </div>
  </div>

  <!-- Form Card -->
  <div class="pl-form-card">
    <div class="pl-form-body">
      <form method="POST">
        {% csrf_token %}

        <!-- Service Title -->
        <div class="pl-field">
          <label class="pl-label">Service Title</label>
          <input type="text" name="title" class="pl-input"
            placeholder="e.g. Web Development">
        </div>

        <!-- Description -->
        <div class="pl-field">
          <label class="pl-label">Description</label>
          <textarea name="description" class="pl-textarea"
            placeholder="Explain what this service includes…"></textarea>
        </div>

        <!-- Footer buttons -->
        <div class="pl-form-footer">
          <a href="{% url 'service_list' %}" class="pl-btn-cancel">Cancel</a>
          <button type="submit" class="pl-btn-submit">Save Service</button>
        </div>

      </form>
    </div>
  </div><!-- /form card -->

</div><!-- /wrap -->
{% endblock %}

{% block js %}
    <script src="{% static 'assets/js/jquery.min.js' %}"></script>
    <script src="{% static 'assets/js/bootstrap/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'assets/js/icons/feather-icon/feather.min.js' %}"></script>
    <script src="{% static 'assets/js/icons/feather-icon/feather-icon.js' %}"></script>
    <script src="{% static 'assets/js/scrollbar/simplebar.js' %}"></script>
    <script src="{% static 'assets/js/scrollbar/custom.js' %}"></script>
    <script src="{% static 'assets/js/config.js' %}"></script>
    <script src="{% static 'assets/js/sidebar-menu.js' %}"></script>
    <script src="{% static 'assets/js/sidebar-pin.js' %}"></script>
    <script src="{% static 'assets/js/slick/slick.min.js' %}"></script>
    <script src="{% static 'assets/js/slick/slick.js' %}"></script>
    <script src="{% static 'assets/js/header-slick.js' %}"></script>
    <script src="{% static 'assets/js/chart/morris-chart/raphael.js' %}"></script>
    <script src="{% static 'assets/js/chart/morris-chart/morris.js' %}"></script>
    <script src="{% static 'assets/js/chart/morris-chart/prettify.min.js' %}"></script>
    <script src="{% static 'assets/js/chart/apex-chart/apex-chart.js' %}"></script>
    <script src="{% static 'assets/js/chart/apex-chart/stock-prices.js' %}"></script>
    <script src="{% static 'assets/js/chart/apex-chart/moment.min.js' %}"></script>
    <script src="{% static 'assets/js/notify/bootstrap-notify.min.js' %}"></script>
    <script src="{% static 'assets/js/dashboard/default.js' %}"></script>
    <script src="{% static 'assets/js/notify/index.js' %}"></script>
    <script src="{% static 'assets/js/datatable/datatables/jquery.dataTables.min.js' %}"></script>
    <script src="{% static 'assets/js/datatable/datatables/datatable.custom.js' %}"></script>
    <script src="{% static 'assets/js/datatable/datatables/datatable.custom1.js' %}"></script>
    <script src="{% static 'assets/js/owlcarousel/owl.carousel.js' %}"></script>
    <script src="{% static 'assets/js/owlcarousel/owl-custom.js' %}"></script>
    <script src="{% static 'assets/js/typeahead/handlebars.js' %}"></script>
    <script src="{% static 'assets/js/typeahead/typeahead.bundle.js' %}"></script>
    <script src="{% static 'assets/js/typeahead/typeahead.custom.js' %}"></script>
    <script src="{% static 'assets/js/typeahead-search/handlebars.js' %}"></script>
    <script src="{% static 'assets/js/typeahead-search/typeahead-custom.js' %}"></script>
    <script src="{% static 'assets/js/height-equal.js' %}"></script>
{% endblock %}
